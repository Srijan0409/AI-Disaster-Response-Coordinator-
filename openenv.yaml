spec_version: 1



name: disaster_env

description: >

  AI Disaster Response Coordinator - a real-world multi-zone emergency triage

  environment set in Uttarakhand, India (2013 Kedarnath floods scenario).

  An AI agent coordinates ambulances, rescue teams, and helicopters to rescue

  trapped civilians across disaster zones under time pressure, spreading threats,

  and dynamic victim spawning.



type: space

runtime: fastapi

app: server.app:app

port: 8000



tags:

  - openenv

  - disaster-response

  - triage

  - real-world

  - multi-zone

  - rescue



tasks:

  - id: task1_easy_rescue

    name: Single-Zone Flash Flood (Easy)

    difficulty: easy

    seed: 42

    max_steps: 30

    success_threshold: 0.5

    description: >

      Single disaster zone at Kedarnath Temple Area. Agent manages 2 ambulances,

      1 rescue team, and 1 helicopter to evacuate 7 trapped civilians.

      No disaster spread. Ideal for learning basic triage prioritisation.



  - id: task2_medium_rescue

    name: Multi-Zone Spreading Disaster (Medium)

    difficulty: medium

    seed: 123

    max_steps: 40

    success_threshold: 0.6

    description: >

      Three disaster zones across Kedarnath (flash flood), Badrinath (landslide),

      and Rishikesh (river overflow). Disaster spreads to adjacent zones every

      5 steps. Agent must balance triage across zones with limited resources.



  - id: task3_hard_rescue

    name: Five-Zone Crisis with Spawning Victims (Hard)

    difficulty: hard

    seed: 999

    max_steps: 25

    success_threshold: 0.7

    description: >

      Five simultaneous disasters across Uttarakhand. Kedarnath starts at

      maximum severity. Disaster spreads every 2 steps. New victims spawn

      every 5 steps. No helicopters available. Agent must triage aggressively

      under extreme time and resource pressure.



action_space:

  type: discrete

  description: Send a rescue unit to a disaster zone

  fields:

    zone_id:

      type: integer

      description: Target zone index (0-indexed)

    unit_type:

      type: string

      enum: [ambulance, rescue_team, helicopter]

      description: >

        ambulance = rescues 2 victims/step (all modes),

        rescue_team = rescues 3 victims/step (all modes),

        helicopter = rescues 5 victims/step (easy + medium only)



observation_space:

  description: Full state of all disaster zones and available resources

  fields:

    time_step:

      type: integer

      description: Current step number

    max_steps:

      type: integer

      description: Total step budget for this episode

    difficulty:

      type: string

      enum: [easy, medium, hard]

    resources:

      type: object

      description: Available rescue units - ambulances, rescue_teams, helicopters

    resources_available:

      type: integer

      description: Sum of all available rescue units

    zones:

      type: array

      description: >

        List of disaster zone dicts. Each zone contains:

        zone_id, name, district, disaster_type, severity (0.0-1.0),

        people, rescued, time_waiting, is_active, victims (list)

    victims:

      type: array

      description: >

        Flat list of all victims across zones. Each victim has:

        id, urgency (1-3), survival_time, distance_km, alive, rescued

    episode_done:

      type: boolean

      description: True when episode has ended

    last_action_info:

      type: object

      description: >

        Info from last step - action_valid, rescued_count, episode_reward.

        On terminal step also contains grade_report with score, passed,

        breakdown, and stats.



reward:

  range: [0, 1]

  description: >

    Per-step: normalized immediate reward based on zone severity rescued

    (high=1.0, med=0.5, low=0.2, wasted=-0.1, invalid=-0.3).

    Terminal: normalized episode score = base_rescue_score - penalties,

    mapped to [0.05, 0.95]. Graded by severity bucket weights:

    high (>=0.7) weighted most, then medium (>=0.4), then low.

